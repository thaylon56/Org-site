<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARAÍBA APOSTAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background-color: #0a0a0a;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 8px,
        rgba(255, 255, 255, 0.02) 8px,
        rgba(255, 255, 255, 0.02) 9px
      );
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 48px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header-image {
      width: 100%;
      max-width: 340px;
      height: auto;
      display: block;
      margin-bottom: 8px;
      border-radius: 12px;
    }

    .link-button {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 14px 18px;
      background: #ff6b00;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 4px 16px rgba(255, 107, 0, 0.35);
    }

    .link-button:hover {
      transform: translateY(-2px);
      background: #ff7f1f;
      box-shadow: 0 6px 24px rgba(255, 107, 0, 0.5);
    }

    .link-button:active {
      transform: translateY(0);
    }

    .icon-circle {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
    }

    .icon-circle svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .button-text {
      flex: 1;
      text-align: center;
      padding-right: 44px;
    }

    .button-text .subtitle {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.85;
      margin-top: 2px;
    }
  </style>
</head>
