<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira - Paraíba Apostas</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="wallet">
  <div id="app-root" data-title="Carteira Virtual" data-subtitle="Gerencie seu saldo e depósitos"></div>

  <div id="page-content-template" style="display:none">
    <div class="dashboard-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">💰 Saldo</span>
        </div>
        <div id="wallet-card"></div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">📥 Solicitar Depósito</span>
        </div>
        <form id="deposit-form">
          <div class="form-group">
            <label for="deposit-admin-select">Escolha o Administrador *</label>
            <select id="deposit-admin-select" class="form-control" required>
              <option value="">Carregando ADMs...</option>
            </select>
            <small class="field-hint">O depósito será analisado pelo ADM escolhido</small>
          </div>

          <div id="deposit-pix-box" class="pix-box"></div>

          <div class="form-group">
            <label for="deposit-amount">Valor (R$) *</label>
            <input type="number" id="deposit-amount" class="form-control" min="5" step="0.01" placeholder="25.00" required>
          </div>

          <div class="form-group">
            <label for="deposit-proof">Comprovante PIX *</label>
            <input type="file" id="deposit-proof" class="form-control" accept="image/*" required>
            <small class="field-hint">Obrigatório para análise do depósito</small>
          </div>

          <div class="form-group">
            <label for="deposit-message">Mensagem para o ADM (opcional)</label>
            <textarea id="deposit-message" class="form-control" rows="2" placeholder="Ex: Depósito feito às 14h, verificar valor..."></textarea>
          </div>

          <p class="text-muted" style="font-size:0.85rem;margin-bottom:1rem;">
            Após enviar, apenas o ADM escolhido (ou quem assumir a análise) poderá ver seu comprovante e mensagem.
          </p>
          <button type="submit" class="btn btn-primary btn-block">Enviar Depósito</button>
        </form>
      </div>

      <div class="card card-full">
        <div class="card-header">
          <span class="card-title">📋 Histórico de Transações</span>
        </div>
        <div id="transactions-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
