<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking - Paraíba Apostas</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="ranking">
  <div id="app-root" data-title="Ranking" data-subtitle="Os maiores apostadores da arena"></div>

  <div id="page-content-template" style="display:none">
    <div class="ranking-tabs">
      <button class="ranking-tab active" data-ranking-tab="monthly_bet">💰 Mais Apostou (Mês)</button>
      <button class="ranking-tab" data-ranking-tab="monthly_wins">🏆 Mais Venceu (Mês)</button>
      <button class="ranking-tab" data-ranking-tab="best_win_streak">🔥 Maior Sequência</button>
      <button class="ranking-tab" data-ranking-tab="total_won">💎 Total Ganho</button>
    </div>

    <div class="card">
      <div id="ranking-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
