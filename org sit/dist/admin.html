<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FF Arena</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="admin">
  <div id="app-root" data-title="Painel Administrativo" data-subtitle="Gerencie depósitos, disputas e usuários"></div>

  <div id="page-content-template" style="display:none">
    <div id="admin-stats" class="admin-stats"></div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-admin-tab="deposits">💰 Depósitos</button>
      <button class="admin-tab" data-admin-tab="disputes">⚠️ Disputas</button>
      <button class="admin-tab" data-admin-tab="users">👥 Usuários</button>
    </div>

    <div id="panel-deposits" class="admin-panel active">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Depósitos Pendentes</span>
        </div>
        <div id="admin-deposits"></div>
      </div>
    </div>

    <div id="panel-disputes" class="admin-panel">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Disputas Pendentes</span>
        </div>
        <div id="admin-disputes"></div>
      </div>
    </div>

    <div id="panel-users" class="admin-panel">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Usuários Registrados</span>
        </div>
        <div id="admin-users" style="overflow-x:auto;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
