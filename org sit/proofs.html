<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Provas - Paraíba Apostas</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="proofs">
  <div id="app-root" data-title="Provas da Partida" data-subtitle="Envie prints, vídeos ou gravações"></div>

  <div id="page-content-template" style="display:none">
    <div class="dashboard-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">📤 Enviar Prova</span>
        </div>
        <form id="proof-form">
          <input type="hidden" id="proof-challenge-id">
          <div class="form-group">
            <label for="proof-type">Tipo de prova</label>
            <select id="proof-type" class="form-control" required>
              <option value="screenshot">📸 Print / Screenshot</option>
              <option value="video">🎥 Vídeo</option>
              <option value="recording">🎙️ Gravação de áudio</option>
            </select>
          </div>
          <div class="form-group">
            <label for="proof-file">Arquivo (máx 50MB)</label>
            <input type="file" id="proof-file" class="form-control" accept="image/*,video/*,audio/*" required>
          </div>
          <div class="form-group">
            <label for="proof-desc">Descrição (opcional)</label>
            <textarea id="proof-desc" class="form-control" rows="3" placeholder="Detalhes sobre a prova..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Enviar Prova</button>
        </form>
        <p class="text-muted" style="font-size:0.85rem;margin-top:1rem;">
          Em caso de disputa, os administradores analisarão as provas enviadas por ambos os jogadores.
        </p>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Provas Enviadas</span>
        </div>
        <div id="proofs-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proofs.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
